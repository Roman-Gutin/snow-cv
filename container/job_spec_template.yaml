spec:
  containers:
    - name: yolo-tracker-analyzer
      image: /MYDB/MYSCHEMA/IMAGES/yolo-tracker-analyzer:latest
      env:
        SNOWFLAKE_WAREHOUSE: MYWAREHOUSE
        # Preferred: full config file on stage (supports any use case)
        STORE_CONFIG_PATH: /mnt/raw_video/configs/my_store.json
        # Legacy single-feed fallback (retail only):
        # VIDEO_PATH: 'MYVIDEO.mp4'
        # STORE_ID: 'my_store'
        # EMPLOYEE_ZONE: '[[x1,y1],[x2,y2],[x3,y3],[x4,y4]]'
        # SERVICE_ZONE: '[[x1,y1],[x2,y2],[x3,y3],[x4,y4]]'
        # QUEUE_ZONE: '[[x1,y1],[x2,y2],[x3,y3],[x4,y4]]'
        # ENTRANCE_ZONE: '[[x1,y1],[x2,y2],[x3,y3],[x4,y4]]'
        # COUNTER_REGION: '[[x1,y1],[x2,y2],[x3,y3],[x4,y4]]'
      resources:
        requests:
          nvidia.com/gpu: 1
        limits:
          nvidia.com/gpu: 1
      volumeMounts:
        - name: stage-raw
          mountPath: /mnt/raw_video
  volumes:
    - name: stage-raw
      source: "@MYDB.MYSCHEMA.RAW_VIDEO"
