# Default event rules for retail surveillance pipeline.
# These match the built-in behavior of the original analyze_frames.py.
#
# Edit this file to customize what events your pipeline detects.
# Rule types:
#   zone_transition - fires when a person moves between zones
#   track_appeared  - fires when a new person is first detected
#   track_lost      - fires when a person disappears after grace period
#   cross_feed      - fires on multi-camera handoff (requires feed_links in config)
#
# Built-in events (always active regardless of rules):
#   entered_store, pre_existing, exited_store
#   queue_entered, queue_exited
#   service_started, service_ended
#   employee_arrived, employee_left
#   abandoned, unserviced
#   counter_unstaffed_start, counter_unstaffed_end
#
# Add custom rules below to extend the built-in set:

rules: []

